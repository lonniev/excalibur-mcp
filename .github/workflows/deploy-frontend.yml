name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_MCP_URL: /mcp
          # Public URL of the scheduled-post cron Worker (scheduler-worker).
          # Vite inlines this at build time; it enables the owner-private
          # "your scheduler is waiting for your OK" card (Device-Grant second
          # surface). Set repo variable VITE_SCHEDULER_URL to the Worker URL
          # (e.g. https://excalibur-scheduler.<account>.workers.dev). Left
          # empty, the card simply stays hidden — a safe default.
          VITE_SCHEDULER_URL: ${{ vars.VITE_SCHEDULER_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT || 'excalibur-app' }}
          workingDirectory: frontend
