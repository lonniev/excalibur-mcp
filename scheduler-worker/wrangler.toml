# Cloudflare Worker — eXcalibur scheduled-post cron trigger.
#
# Protocol-honoring: the Worker stores NO secrets. It obtains operator
# authorization via the Secure Courier npub-proof dance (request_npub_proof →
# operator key-holder replies → receive_npub_proof) and caches only the
# short-lived token it gets back, in KV. The operator npub and MCP URL are
# public. Deploy is DEFERRED until the operator opts in.

name = "excalibur-scheduler"
main = "src/index.ts"
compatibility_date = "2026-06-19"

# Every 10 minutes. ~5-min cron granularity is fine for social posting.
[triggers]
crons = ["*/10 * * * *"]

[vars]
# Public, not secret.
MCP_URL = "https://excalibur-mcp.fastmcp.app/mcp"
# The operator's PUBLIC npub the worker proxies. Set to the real npub at deploy.
OPERATOR_NPUB = "npub1..."

# KV caches the protocol-issued, short-lived proof token (+ in-flight poison) —
# the same role localStorage plays for the FE. Create the namespace and paste
# its id here:
#   wrangler kv namespace create PROOF_KV
[[kv_namespaces]]
binding = "PROOF_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
