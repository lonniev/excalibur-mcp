# Cloudflare Worker — eXcalibur scheduled-post cron trigger.
#
# Protocol-honoring: the Worker stores NO secrets and isn't even provisioned
# with the operator's npub. It asks the MCP "who are you?" each tick (the free
# list_canonical_identities tool returns operator_npub), then obtains operator
# authorization via the Secure Courier npub-proof dance (request_npub_proof →
# operator key-holder replies → receive_npub_proof), caching only the
# short-lived token it gets back, in KV. The MCP URL is the only configuration.

name = "excalibur-scheduler"
main = "src/index.ts"
compatibility_date = "2026-06-19"

# Every 30 minutes (on the hour and the half hour). Social posting doesn't need
# minute precision, and a wider cadence lets the Neon compute scale to zero
# between ticks instead of being pinned awake 24/7 — patrons who need immediacy
# use "Post Now" in the UI rather than waiting for a tick.
[triggers]
crons = ["*/30 * * * *"]

[vars]
# Public, not secret. The worker self-discovers the operator npub from this MCP.
MCP_URL = "https://excalibur-mcp.fastmcp.app/mcp"

# KV caches the protocol-issued, short-lived proof token (+ in-flight poison) —
# the same role localStorage plays for the FE. Create the namespace and paste
# its id here:
#   wrangler kv namespace create PROOF_KV
[[kv_namespaces]]
binding = "PROOF_KV"
id = "3a9695d1fb0a43449af7cfc885a60c15"
